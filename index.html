<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem HPP & Recipe Card F&B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-tab.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-md p-4">
        <div class="max-w-6xl mx-auto flex gap-4 font-semibold text-gray-600">
            <button onclick="switchTab('tab-direktori')" id="btn-tab-direktori" class="btn-tab active pb-2">Directory Menu</button>
            <button onclick="switchTab('tab-bahan-baku')" id="btn-tab-bahan-baku" class="btn-tab pb-2">Bahan Baku</button>
            <button onclick="switchTab('tab-input-hpp')" id="btn-tab-input-hpp" class="btn-tab pb-2">Input Resep & HPP</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto mt-6 p-4">

        <div id="tab-direktori" class="tab-content active">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Directory Recipe Card</h2>
                <div class="flex gap-2">
                    <input type="text" id="search-resep" placeholder="Cari menu / kategori..." class="p-2 border rounded" oninput="loadDirektori()">
                    <select id="sort-resep" class="p-2 border rounded" onchange="loadDirektori()">
                        <option value="nama">Sort by Nama</option>
                        <option value="hpp_asc">Sort by %HPP (Terendah)</option>
                        <option value="hpp_desc">Sort by %HPP (Tertinggi)</option>
                    </select>
                </div>
            </div>
            <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

        <div id="tab-bahan-baku" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Database Bahan Baku</h2>
            <div class="bg-white p-6 rounded shadow mb-6">
                <h3 class="text-lg font-semibold mb-2">Input Bahan Baku Baru</h3>
                <div class="flex gap-4">
                    <input type="text" id="bb-nama" placeholder="Nama Bahan (ex: Susu UHT)" class="w-full p-2 border rounded">
                    <input type="text" id="bb-satuan" placeholder="Satuan (ex: ml, gr)" class="w-1/4 p-2 border rounded">
                    <input type="number" id="bb-harga" placeholder="Harga / Satuan (Rp)" class="w-1/4 p-2 border rounded">
                    <button onclick="tambahBahanBaku()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Simpan</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded shadow">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b">
                            <th class="pb-2">Nama Bahan</th>
                            <th class="pb-2">Satuan</th>
                            <th class="pb-2">Harga per Satuan</th>
                        </tr>
                    </thead>
                    <tbody id="table-bahan-baku">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="tab-input-hpp" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Kalkulator & Input HPP</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded shadow">
                    <h3 class="font-semibold mb-4 text-lg border-b pb-2">Informasi Menu</h3>
                    <div class="space-y-4">
                        <div><label class="block text-sm">Nama Menu</label><input type="text" id="r-nama" class="w-full p-2 border rounded"></div>
                        <div class="flex gap-4">
                            <div class="w-1/2"><label class="block text-sm">Kategori (ex: Beverage)</label><input type="text" id="r-kategori" class="w-full p-2 border rounded"></div>
                            <div class="w-1/2"><label class="block text-sm">Sub-Kategori (ex: Matcha)</label><input type="text" id="r-sub" class="w-full p-2 border rounded"></div>
                        </div>
                        <div><label class="block text-sm">Harga Jual (Rp)</label><input type="number" id="r-harga-jual" class="w-full p-2 border rounded"></div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded shadow">
                    <h3 class="font-semibold mb-4 text-lg border-b pb-2">Komposisi Resep</h3>
                    <div class="flex gap-2 mb-4">
                        <select id="r-pilih-bb" class="w-full p-2 border rounded"></select>
                        <input type="number" id="r-qty-bb" placeholder="Qty" class="w-1/4 p-2 border rounded">
                        <button onclick="addTempKomposisi()" class="bg-green-600 text-white px-4 rounded hover:bg-green-700">+</button>
                    </div>
                    <table class="w-full text-left text-sm mb-4">
                        <thead><tr class="border-b"><th class="pb-1">Bahan</th><th class="pb-1">Qty</th><th class="pb-1">Subtotal</th><th class="pb-1">Aksi</th></tr></thead>
                        <tbody id="temp-komposisi-list"></tbody>
                    </table>
                    
                    <div class="bg-gray-50 p-4 rounded text-sm space-y-1 mb-4">
                        <div class="flex justify-between"><span>Total Cost (HPP):</span> <span id="r-total-cost" class="font-bold text-red-600">Rp 0</span></div>
                        <div class="flex justify-between"><span>Target Harga Jual:</span> <span id="r-target-jual" class="font-bold text-blue-600">Rp 0</span></div>
                        <div class="flex justify-between border-t pt-1 mt-1"><span>Persentase HPP:</span> <span id="r-persentase" class="font-bold">0%</span></div>
                        <div class="flex justify-between"><span>Margin Profit:</span> <span id="r-margin" class="font-bold text-green-600">Rp 0</span></div>
                    </div>

                    <button onclick="simpanResepFinal()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Simpan Resep ke Database</button>
                </div>
            </div>
        </div>

    </div>

<script>
        // 1. Inisialisasi Supabase menggunakan kredensial Anda
        const SUPABASE_URL = 'https://mslsgobvzzxxkwfvpjhx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zbHNnb2J2enp4eGt3ZnZwamh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzAzMDEsImV4cCI6MjA5NzgwNjMwMX0.V7pUmC3En3O0pc3VamJUm9eq7cnB7UFLi333LmtnJqQ';
        
        // PERBAIKAN: Mengubah nama variabel menjadi supabaseClient agar tidak bentrok dengan CDN global
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State & Variabel Global
        let bahanBakuList = [];
        let tempKomposisi = [];

        // Format Rupiah
        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        // Logika Pindah Tab
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.btn-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');

            if(tabId === 'tab-bahan-baku') loadBahanBaku();
            if(tabId === 'tab-input-hpp') loadDropdownBahanBaku();
            if(tabId === 'tab-direktori') loadDirektori();
        }

        /* ========================
           MODUL 1: BAHAN BAKU
           ======================== */
        async function loadBahanBaku() {
            const { data, error } = await supabaseClient.from('bahan_baku').select('*').order('nama', { ascending: true });
            if (error) return console.error("Error fetching bahan baku!", error);
            bahanBakuList = data;
            
            const tbody = document.getElementById('table-bahan-baku');
            tbody.innerHTML = '';
            data.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="py-2">${item.nama}</td>
                        <td class="py-2">${item.satuan}</td>
                        <td class="py-2">${formatRp(item.harga)}</td>
                    </tr>
                `;
            });
        }

        async function tambahBahanBaku() {
            const nama = document.getElementById('bb-nama').value;
            const satuan = document.getElementById('bb-satuan').value;
            const harga = document.getElementById('bb-harga').value;

            if(!nama || !satuan || !harga) return alert("Lengkapi data bahan baku!");

            const { data, error } = await supabaseClient.from('bahan_baku').insert([{ nama, satuan, harga }]);
            if (error) alert("Gagal menyimpan!");
            else {
                alert("Bahan baku berhasil ditambahkan!");
                document.getElementById('bb-nama').value = '';
                document.getElementById('bb-satuan').value = '';
                document.getElementById('bb-harga').value = '';
                loadBahanBaku();
            }
        }

        /* ========================
           MODUL 2: INPUT HPP & RESEP
           ======================== */
        async function loadDropdownBahanBaku() {
            const { data } = await supabaseClient.from('bahan_baku').select('*').order('nama');
            bahanBakuList = data;
            const select = document.getElementById('r-pilih-bb');
            select.innerHTML = '<option value="">-- Pilih Bahan Baku --</option>';
            data.forEach(bb => {
                select.innerHTML += `<option value="${bb.id}" data-harga="${bb.harga}" data-nama="${bb.nama}" data-satuan="${bb.satuan}">${bb.nama} (${formatRp(bb.harga)}/${bb.satuan})</option>`;
            });
        }

        document.getElementById('r-harga-jual').addEventListener('input', updateKalkulasiHPP);

        function addTempKomposisi() {
            const select = document.getElementById('r-pilih-bb');
            const qty = parseFloat(document.getElementById('r-qty-bb').value);
            
            if(!select.value || !qty) return alert("Pilih bahan dan masukkan Qty!");

            const selectedOption = select.options[select.selectedIndex];
            const harga = parseFloat(selectedOption.getAttribute('data-harga'));
            const subtotal = harga * qty;

            tempKomposisi.push({
                bahan_baku_id: select.value,
                nama: selectedOption.getAttribute('data-nama'),
                satuan: selectedOption.getAttribute('data-satuan'),
                qty: qty,
                subtotal: subtotal
            });

            document.getElementById('r-qty-bb').value = '';
            renderTempKomposisi();
        }

        function removeTempKomposisi(index) {
            tempKomposisi.splice(index, 1);
            renderTempKomposisi();
        }

        function renderTempKomposisi() {
            const tbody = document.getElementById('temp-komposisi-list');
            tbody.innerHTML = '';
            tempKomposisi.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="py-1">${item.nama}</td>
                        <td class="py-1">${item.qty} ${item.satuan}</td>
                        <td class="py-1">${formatRp(item.subtotal)}</td>
                        <td class="py-1"><button onclick="removeTempKomposisi(${index})" class="text-red-500 text-xs font-bold">X</button></td>
                    </tr>
                `;
            });
            updateKalkulasiHPP();
        }

        function updateKalkulasiHPP() {
            const hargaJual = parseFloat(document.getElementById('r-harga-jual').value) || 0;
            const totalCost = tempKomposisi.reduce((sum, item) => sum + item.subtotal, 0);
            
            let persentase = 0;
            if(hargaJual > 0) persentase = ((totalCost / hargaJual) * 100).toFixed(2);
            
            const margin = hargaJual - totalCost;

            document.getElementById('r-total-cost').innerText = formatRp(totalCost);
            document.getElementById('r-target-jual').innerText = formatRp(hargaJual);
            document.getElementById('r-persentase').innerText = persentase + '%';
            document.getElementById('r-margin').innerText = formatRp(margin);
        }

        async function simpanResepFinal() {
            const nama = document.getElementById('r-nama').value;
            const kategori = document.getElementById('r-kategori').value;
            const sub = document.getElementById('r-sub').value;
            const harga_jual = document.getElementById('r-harga-jual').value;

            if(!nama || !kategori || !harga_jual || tempKomposisi.length === 0) {
                return alert("Lengkapi data menu dan komposisi!");
            }

            const { data: resepData, error: resepErr } = await supabaseClient
                .from('resep')
                .insert([{ nama, kategori, sub_kategori: sub, harga_jual }])
                .select();

            if(resepErr) return alert("Gagal menyimpan resep!");
            
            const newResepId = resepData[0].id;

            const detailPayload = tempKomposisi.map(item => ({
                resep_id: newResepId,
                bahan_baku_id: item.bahan_baku_id,
                qty: item.qty
            }));

            const { error: detailErr } = await supabaseClient.from('resep_detail').insert(detailPayload);

            if(detailErr) alert("Resep tersimpan tapi gagal menyimpan komposisi.");
            else {
                alert("Resep berhasil disimpan!");
                document.getElementById('r-nama').value = '';
                document.getElementById('r-kategori').value = '';
                document.getElementById('r-sub').value = '';
                document.getElementById('r-harga-jual').value = '';
                tempKomposisi = [];
                renderTempKomposisi();
            }
        }

        /* ========================
           MODUL 3: DIREKTORI RESEP
           ======================== */
        async function loadDirektori() {
            const { data, error } = await supabaseClient
                .from('resep')
                .select(`
                    id, nama, kategori, sub_kategori, harga_jual,
                    resep_detail (
                        qty,
                        bahan_baku (nama, satuan, harga)
                    )
                `);

            if(error) return console.error("Error fetching data direktori!", error);

            let processedData = data.map(menu => {
                let totalCost = 0;
                let komposisiHTML = '';

                menu.resep_detail.forEach(det => {
                    const costBahan = det.qty * det.bahan_baku.harga;
                    totalCost += costBahan;
                    komposisiHTML += `<li class="flex justify-between text-sm"><span class="text-gray-600">- ${det.bahan_baku.nama} (${det.qty}${det.bahan_baku.satuan})</span> <span>${formatRp(costBahan)}</span></li>`;
                });

                const margin = menu.harga_jual - totalCost;
                const hppPersen = menu.harga_jual > 0 ? (totalCost / menu.harga_jual) * 100 : 0;

                return {
                    ...menu,
                    totalCost,
                    margin,
                    hppPersen,
                    komposisiHTML
                };
            });

            const searchKeyword = document.getElementById('search-resep').value.toLowerCase();
            if(searchKeyword) {
                processedData = processedData.filter(m => 
                    m.nama.toLowerCase().includes(searchKeyword) || 
                    m.kategori.toLowerCase().includes(searchKeyword) || 
                    m.sub_kategori.toLowerCase().includes(searchKeyword)
                );
            }

            const sortBy = document.getElementById('sort-resep').value;
            if(sortBy === 'nama') processedData.sort((a,b) => a.nama.localeCompare(b.nama));
            if(sortBy === 'hpp_asc') processedData.sort((a,b) => a.hppPersen - b.hppPersen);
            if(sortBy === 'hpp_desc') processedData.sort((a,b) => b.hppPersen - a.hppPersen);

            const grid = document.getElementById('recipe-grid');
            grid.innerHTML = '';

            processedData.forEach(menu => {
                let hppColor = menu.hppPersen > 35 ? 'text-red-600' : 'text-green-600';

                grid.innerHTML += `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden border border-gray-200">
                        <div class="bg-gray-800 text-white p-4">
                            <span class="text-xs font-bold uppercase bg-blue-500 px-2 py-1 rounded mb-2 inline-block">${menu.kategori} > ${menu.sub_kategori}</span>
                            <h3 class="text-xl font-bold">${menu.nama}</h3>
                        </div>
                        <div class="p-4">
                            <h4 class="font-semibold text-sm border-b pb-1 mb-2">Ingredients:</h4>
                            <ul class="space-y-1 mb-4 h-24 overflow-y-auto">
                                ${menu.komposisiHTML}
                            </ul>
                            
                            <div class="bg-gray-50 p-3 rounded text-sm space-y-2 border">
                                <div class="flex justify-between">
                                    <span class="text-gray-500">Harga Jual:</span>
                                    <span class="font-bold">${formatRp(menu.harga_jual)}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-gray-500">Total HPP/Cost:</span>
                                    <span class="font-bold">${formatRp(menu.totalCost)}</span>
                                </div>
                                <div class="flex justify-between border-t pt-2">
                                    <span class="text-gray-500">Margin:</span>
                                    <span class="font-bold text-green-600">${formatRp(menu.margin)}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-gray-500">% HPP:</span>
                                    <span class="font-bold ${hppColor}">${menu.hppPersen.toFixed(2)}%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = () => {
            loadDirektori();
        };
    </script>
</body>
</html>
